id: georfa
title: Geometric Refined Accuracy
description: 
requirements:
  goal:
    description: |-
      Values provided under [@geometric-accuracy] are provided by the SAR mission Cal/Val team.
  
      CEOS-ARD processing steps could include method refining the geometric accuracy, such as cross-correlation of the SAR data in slant range with a SAR scene simulated from a DSM or DEM.
  
      Methodology used (name and reference), quality flag, geometric standard deviation values should be provided. 
    optional: true
dependencies:
  geometric-accuracy: corrections/geometric-accuracy-radar
glossary:
  - ceos-ard
  - dsm
  - dem
references:
changes:
history:
  - SAR 4.4
