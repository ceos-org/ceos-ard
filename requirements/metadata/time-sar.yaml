id: timsar
title: Data Collection Time
description:
requirements:
  threshold:
    # todo: the number of source data acquisitions has nothing to do with the time requirements, should be separate.
    description: |-
      Number of source data acquisitions of the data collection is identified.
      The start and stop UTC time of data collection is identified in the metadata, expressed in date/time.
      In case of composite products, the dates/times of the first and last data takes and the per-pixel metadata [@acquisition-id] is provided with the product.
dependencies:
  acquisition-id: per-pixel/acquisition-id
glossary:
  - utc
references:
changes:
history:
  - SAR 1.5
