id: trace-ar
title: Traceability
description:
requirements:
  threshold:
    description: |-
      Aquatic Reflectance (dimensionless) or the Remote Sensing Reflectance ($sr^{-1}$) of the water bodies ($AR = \pi \times R_{rs}$) is given.
  goal:
    description: Data must be traceable to SI reference standard.
    notes:
      - Relationship to [@uncertainty]. Traceability requires an estimate of measurement uncertainty.
    optional: true
dependencies:
  uncertainty: measurements/uncertainty-ar
glossary:
  - doi
  - si
references:
changes:
history:
  - AR 1.1
