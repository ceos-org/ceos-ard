id: mnormal-sr
title: Measurement Normalisation
description:
requirements:
  goal:
    description: |-
      Measurements are normalised for solar and viewing conditions (i.e., nadir view angle and average solar angles). This may include terrain illumination and/or Bi-Directional Reflectance Function (BRDF) correction.
    notes:
      - Information on measurement normalisation should be available in the metadata as a single DOI landing page.
    optional: true
