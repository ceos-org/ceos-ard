id: msnlsr
title: Measurement
description: 
requirements:
  threshold:
    description: |-
      Pixel values that are expressed as a measurement of the nighttime light radiance.
    notes:
      - Radiometric corrections must lead to a valid measurement of surface reflectance.
  goal:
    description: |-
      Nighttime light radiance measurements are SI traceable (see also [@traceability]).
    optional: true
dependencies:
  traceability: metadata/traceability-sr
glossary:
  - si
