id: measur-st
title: Measurement
description: 
requirements:
  threshold:
    description: |-
      Pixel values are expressed as a measurement of the Surface Temperature of the land, expressed as Kelvin
    notes:
      - Radiometric corrections must lead to a valid measurement of surface temperature.
  goal:
    description: |-
      Surface temperature measurements are SI traceable (see also [@traceability]).
    optional: true
dependencies:
  traceability: metadata/traceability-st
glossary:
  - si
references:
changes:
history:
  - ST 3.1
